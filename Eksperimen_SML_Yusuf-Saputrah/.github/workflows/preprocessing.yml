name: Preprocessing Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'dataset_raw/dataset_raw.csv'
      - 'preprocessing/automate_Yusuf-Saputrah.py'

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn

      - name: Run preprocessing script
        run: |
          cd preprocessing
          python automate_Yusuf-Saputrah.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add preprocessing/dataset_preprocessing/dataset_preprocessing.csv
          git commit -m "Automated data preprocessing update" || echo "No changes to commit"
          git push
