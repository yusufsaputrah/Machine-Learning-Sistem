name: Advanced CI Pipeline # trigger

on:
  push:
    branches:
      - main
    paths:
      - 'Workflow-CI/MLProject/**'
      - '.github/workflows/retrain.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          pip install mlflow pandas scikit-learn

      - name: Run mlflow project
        env:
          # Gunakan path absolut agar artifact_uri selalu resolved dengan benar
          MLFLOW_TRACKING_URI: "file://${{ github.workspace }}/Workflow-CI/MLProject/mlruns"
          # Diperlukan di MLflow terbaru agar file store tidak diblokir
          MLFLOW_ALLOW_FILE_STORE: "true"
        run: |
          cd Workflow-CI/MLProject
          # Hapus mlruns lama agar selalu fresh (hindari konflik artifact_location dari run sebelumnya)
          rm -rf mlruns
          mlflow run . -P n_estimators=100 --env-manager=local

      - name: Get latest MLflow run_id
        id: get_run_id
        run: |
          # Mengambil run_id terakhir (hash 32 karakter) dari folder mlruns
          cd Workflow-CI/MLProject
          RUN_ID=$(ls -t mlruns/0 | grep -E '^[0-9a-f]{32}$' | head -n 1)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest Run ID: $RUN_ID"

      - name: Upload MLflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: Workflow-CI/MLProject/mlruns/

      - name: Build Docker Model
        env:
          # Sama persis dengan saat training agar MLflow bisa resolve runs:/<run_id>/model
          MLFLOW_TRACKING_URI: "file://${{ github.workspace }}/Workflow-CI/MLProject/mlruns"
          MLFLOW_ALLOW_FILE_STORE: "true"
        run: |
          # Gunakan runs:/<run_id>/model — MLflow akan resolve artifact via tracking URI
          mlflow models build-docker \
            -m "runs:/${{ env.RUN_ID }}/model" \
            -n sistem-ml-model:latest

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Docker Image
        run: |
          docker tag sistem-ml-model:latest ${{ secrets.DOCKERHUB_USERNAME }}/sistem-ml-model:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/sistem-ml-model:latest
