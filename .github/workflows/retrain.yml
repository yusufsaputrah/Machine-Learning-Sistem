name: Advanced CI Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'Workflow-CI/MLProject/**'
      - '.github/workflows/retrain.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas scikit-learn

      - name: Run mlflow project
        run: |
          cd Workflow-CI/MLProject
          mlflow run . -P n_estimators=100 --env-manager=local

      - name: Get latest MLflow run_id
        id: get_run_id
        run: |
          # Mengambil run_id terakhir dari folder mlruns
          cd Workflow-CI/MLProject
          RUN_ID=$(ls -t mlruns/0 | head -n 1)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest Run ID: $RUN_ID"

      - name: Install Python dependencies
        run: |
          pip install dvc dvc-gdrive

      - name: Upload to GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add Workflow-CI/MLProject/mlruns/
          git commit -m "chore: upload MLflow local runs to GitHub" || echo "No changes to commit"
          git push

      - name: Build Docker Model
        run: |
          cd Workflow-CI/MLProject
          mlflow models build-docker -m mlruns/0/${{ env.RUN_ID }}/artifacts/model -n sistem-ml-model:latest

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Docker Image
        run: |
          docker tag sistem-ml-model:latest ${{ secrets.DOCKERHUB_USERNAME }}/sistem-ml-model:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/sistem-ml-model:latest
